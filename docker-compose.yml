services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
      - ml-service
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "5173:80"

  ml-service:
    build:
      context: .
      dockerfile: docker/ml.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  mongo_data:
